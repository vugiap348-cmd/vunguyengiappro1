                        showToast(`✅ Chào ${cloudUser.displayName} — Dữ liệu mới nhất từ cloud`, 'success');
                        setCloudStatus('synced');

                        if (rememberMe) {
                            localStorage.setItem(STORAGE_KEYS.REMEMBER, JSON.stringify({ user: cloudUser.user, pass: cloudUser.pass }));
                        } else {
                            localStorage.removeItem(STORAGE_KEYS.REMEMBER);
                        }
                    } else {
                        // Fallback: kiểm tra local nếu không có mạng
                        const localFound = users.find(u => u.user.toLowerCase() === username.toLowerCase() && u.pass === password);
                        if (localFound) {
                            setCurrentUser(localFound);
                            if (localFound.examHistory) setExamHistory(localFound.examHistory);
                            setIsUnlocked(true);
                            playSound();
                            showToast(`✅ Đăng nhập offline (dữ liệu local)`, 'info');
                            setCloudStatus('error');
                            if (rememberMe) localStorage.setItem(STORAGE_KEYS.REMEMBER, JSON.stringify({ user: localFound.user, pass: localFound.pass }));
                        } else {
                            showToast("❌ Sai tài khoản hoặc mật khẩu", 'error');
                            setCloudStatus('error');
                        }
                    }
                } catch (error) {
                    console.error("Login error:", error);
                    showToast("❌ Có lỗi xảy ra", 'error');
                    setCloudStatus('error');
                }
            };

            const handleLogout = () => {
                setIsUnlocked(false); 
                playSound("https://www.soundjay.com/mechanical/sounds/iron-gate-close-1.mp3");
                setTimeout(() => { 
                    setCurrentUser(null); 
                    setUsername(""); 
                    setPassword(""); 
                    setActiveIframe(""); 
                    setIsSidebarOpen(false); 
                }, 1200);
                showToast("Đã đăng xuất", 'info');
            };

            // Cập nhật user và tự động sync lên cloud
            const updateUserInList = async (updatedUser, silent = false) => {
                setCloudStatus('syncing');
                
                const newUsers = users.map(u => u.user === updatedUser.user ? updatedUser : u);
                setUsers(newUsers);
                setCurrentUser(updatedUser);
                if (updatedUser.examHistory) setExamHistory(updatedUser.examHistory);
                
                // Lưu local ngay
                localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(newUsers));
                
                // Lưu lên cloud
                const cloudSaved = await saveUserToCloud(updatedUser);
                
                if (cloudSaved) {
                    setCloudStatus('synced');
                    if (!silent) showToast('☁️ Đã lưu & đồng bộ cloud', 'success');
                } else {
                    setCloudStatus('error');
                    if (!silent) showToast('⚠️ Lưu local OK, cloud lỗi', 'error');
                }
                
                if (rememberMe && updatedUser.user === currentUser?.user) {
                    localStorage.setItem(STORAGE_KEYS.REMEMBER, JSON.stringify({ user: updatedUser.user, pass: updatedUser.pass }));
                }
                
                return newUsers;
            };

            const handleAddCustomExam = async () => {
                if (!newExamTitle.trim() || !newExamUrl.trim()) {
                    showToast("Vui lòng nhập đầy đủ tiêu đề và link", 'error');
                    return;
                }
                if (!newExamUrl.startsWith('http')) {
                    showToast("Link phải bắt đầu bằng http:// hoặc https://", 'error');
                    return;
                }
                
                const updatedUser = {
                    ...currentUser,
                    customExams: [...(currentUser.customExams || []), { title: newExamTitle, url: newExamUrl }]
                };
                
                await updateUserInList(updatedUser);
                setNewExamTitle("");
                setNewExamUrl("");
                showToast("✅ Đã thêm đề mới", 'success');
            };

            const handleDeleteCustomExam = async (index) => {
                const updatedExams = currentUser.customExams.filter((_, i) => i !== index);
                const updatedUser = { ...currentUser, customExams: updatedExams };
                await updateUserInList(updatedUser);
                showToast("✅ Đã xóa đề", 'success');
            };

            const openProfile = () => {
                if (!currentUser) return;
                setNewDisplayName(currentUser.displayName);
                setSelectedAvatar(currentUser.avatar);
                setAvatarLink("");
                setProfileTab('info');
                setOtpStep(1); 
                setOtpInput(""); 
                setNewPassword("");
                setNewExamTitle(""); 
                setNewExamUrl("");
                setShowProfileModal(true);
            };

            const handleUpdateProfile = async () => {
                if (!currentUser) return;
                
                setCloudStatus('syncing');
                showToast('🔄 Đang lưu và đồng bộ...', 'info');
                
                let newAvatar = currentUser.avatar;
                if (avatarLink) {
                    newAvatar = avatarLink;
                } else if (selectedAvatar) {
                    newAvatar = selectedAvatar;
                }
                const updated = { 
                    ...currentUser, 
                    displayName: newDisplayName || currentUser.displayName, 
                    avatar: newAvatar 
                };
                await updateUserInList(updated);
                showToast("✅ Đã lưu và đồng bộ lên cloud", 'success');
                setShowProfileModal(false);
            };

            const sendOtpForPassword = async () => {
                if (!currentUser) return;
                setIsLoading(true);
                const otp = Math.floor(100000 + Math.random() * 900000).toString();
                setOtpSent(otp);
                try {
                    await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                        otp_code: otp, to_email: currentUser.email, user_name: currentUser.displayName
                    });
                    setOtpStep(2); 
                    showToast("✅ Mã OTP đã gửi", 'success');
                } catch { 
                    showToast("❌ Gửi email thất bại", 'error'); 
                } finally { 
                    setIsLoading(false); 
                }
            };

            const verifyOtpAndChangePassword = async () => {
                if (!currentUser) return;
                if (otpInput === otpSent) {
                    if (newPassword.length < 6) return showToast("Mật khẩu tối thiểu 6 ký tự", 'error');
                    const updated = { ...currentUser, pass: newPassword };
                    await updateUserInList(updated);
                    showToast("✅ Mật khẩu đã thay đổi", 'success');
                    setShowProfileModal(false);
                } else {
                    showToast("❌ Mã OTP không đúng", 'error');
                }
            };

            const sendForgotOtp = async () => {
                const target = forgotUser || currentUser?.user;
                const userFound = users.find(u => u.user.toLowerCase() === target?.toLowerCase());
                if (!userFound) return showToast("❌ Tài khoản không tồn tại", 'error');
                setIsLoading(true);
                const otp = Math.floor(100000 + Math.random() * 900000).toString();
                setSentOtp(otp);
                try {
                    await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { 
                        otp_code: otp, to_email: userFound.email, user_name: userFound.displayName 
                    });
                    setForgotStep(2); 
                    showToast("✅ Mã OTP đã gửi", 'success');
                } catch { 
                    showToast("❌ Gửi mail thất bại", 'error'); 
                } finally { 
                    setIsLoading(false); 
                }
            };

            const verifyForgotOtp = () => {
                if (inputOtp === sentOtp) setForgotStep(3);
                else showToast("❌ Mã OTP không đúng", 'error');
            };

            const updateForgotPassword = async () => {
                if (forgotNewPassword.length < 6) return showToast("Mật khẩu tối thiểu 6 ký tự", 'error');
                const idx = users.findIndex(u => u.user.toLowerCase() === (forgotUser || currentUser?.user).toLowerCase());
                if (idx !== -1) {
                    const updated = [...users]; 
                    updated[idx].pass = forgotNewPassword;
                    
                    setUsers(updated); 
                    localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(updated));
                    
                    // Lưu lên cloud
                    await saveUserToCloud(updated[idx]);
                    
                    if (rememberMe && currentUser?.user === updated[idx].user) {
                        localStorage.setItem(STORAGE_KEYS.REMEMBER, JSON.stringify({ 
                            user: updated[idx].user, pass: forgotNewPassword 
                        }));
                    }
                    showToast("✅ Mật khẩu đã cập nhật", 'success'); 
                    setShowForgotModal(false);
                }
            };

            const handleManualSync = async () => {
                setIsSyncing(true);
                setCloudStatus('syncing');
                showToast('🔄 Đang tải dữ liệu từ cloud...', 'info');
                
                try {
                    // Load thẳng user hiện tại từ cloud - đảm bảo mới nhất
                    if (currentUser) {
                        const freshUser = await loadUserFromCloud(currentUser.user);
                        if (freshUser) {
                            // Cập nhật currentUser
                            setCurrentUser(freshUser);
                            if (freshUser.examHistory) setExamHistory(freshUser.examHistory);
                            
                            // Cập nhật users list
                            setUsers(prev => prev.map(u => u.user === freshUser.user ? freshUser : u));
                            
                            // Cập nhật localStorage
                            const updated = users.map(u => u.user === freshUser.user ? freshUser : u);
                            localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(updated));
                            
                            // Cập nhật remember me
                            if (rememberMe) {
                                localStorage.setItem(STORAGE_KEYS.REMEMBER, JSON.stringify({ user: freshUser.user, pass: freshUser.pass }));
                            }
                            
                            showToast('✅ Dữ liệu đã được cập nhật!', 'success');
                            setCloudStatus('synced');
                        } else {
                            showToast('⚠️ Không tìm thấy dữ liệu trên cloud', 'error');
                            setCloudStatus('error');
                        }
                    }
                } catch (error) {
                    console.error('Sync error:', error);
                    showToast('⚠️ Tải thất bại, kiểm tra kết nối', 'error');
                    setCloudStatus('error');
                }
                
                setIsSyncing(false);
            };

            // Thêm điểm mới
            const handleAddScore = async () => {
                if (!newExamName.trim() || !newScore.trim() || !newMaxScore.trim()) {
                    showToast("❌ Vui lòng nhập đầy đủ thông tin", 'error');
                    return;
                }
                
                const score = parseFloat(newScore);
                const maxScore = parseFloat(newMaxScore);
                
                if (isNaN(score) || isNaN(maxScore) || score < 0 || maxScore <= 0 || score > maxScore) {
                    showToast("❌ Điểm số không hợp lệ", 'error');
                    return;
                }
                
                const newEntry = {
                    id: Date.now(),
                    examName: newExamName,
                    score: score,
                    maxScore: maxScore,
                    percentage: ((score / maxScore) * 100).toFixed(1),
                    date: new Date().toLocaleString('vi-VN')
                };
                
                const updatedHistory = [newEntry, ...(currentUser.examHistory || [])];
                const updatedUser = { ...currentUser, examHistory: updatedHistory };
                
                await updateUserInList(updatedUser);
                setExamHistory(updatedHistory);
                setNewExamName("");
                setNewScore("");
                setNewMaxScore("");
                setShowAddScore(false);
                showToast("✅ Đã thêm điểm", 'success');
            };

            // Xóa lịch sử
            const handleDeleteHistory = async (id) => {
                const updatedHistory = examHistory.filter(item => item.id !== id);
                const updatedUser = { ...currentUser, examHistory: updatedHistory };
                await updateUserInList(updatedUser);
                setExamHistory(updatedHistory);
                showToast("✅ Đã xóa", 'success');
            };

            // Xóa toàn bộ lịch sử
            const handleClearHistory = async () => {
                if (confirm("⚠️ Xóa toàn bộ lịch sử điểm? Không thể hoàn tác!")) {
                    const updatedUser = { ...currentUser, examHistory: [] };
                    await updateUserInList(updatedUser);
                    setExamHistory([]);
                    showToast("✅ Đã xóa toàn bộ lịch sử", 'success');
                }
            };

            const filteredExams = useMemo(() => {
                const all = [
                    ...AZOTA_DATA.map((item, i) => ({ type: 'azota', title: `Đề ${i+1}: ${item.n}`, url: item.u, id: i+1 }))
                ];
                if (currentUser?.customExams) {
                    currentUser.customExams.forEach((exam, idx) => {
                        all.push({ type: 'custom', title: exam.title, url: exam.url, id: `custom-${idx}` });
                    });
                }
                return all.filter(item => item.title.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [searchTerm, currentUser?.customExams]);

            const handleYoutubeInputChange = (e) => {
                const val = e.target.value;
                setYoutubeInput(val);
                const id = extractYoutubeId(val);
                if (id) setVideoId(id);
            };

            return (
                <div className="relative w-full h-screen text-white overflow-hidden">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

                    {/* Cloud Status Badge - Hidden, moved to Profile */}
                    {/* <div className="fixed top-4 right-4 z-[150] cloud-badge">
                        <div className={`flex items-center gap-2 px-4 py-2 rounded-full backdrop-blur-xl border text-xs font-bold ${
                            cloudStatus === 'synced' ? 'bg-green-500/20 border-green-500/30 text-green-400' :
                            cloudStatus === 'syncing' ? 'bg-yellow-500/20 border-yellow-500/30 text-yellow-400' :
                            cloudStatus === 'error' ? 'bg-red-500/20 border-red-500/30 text-red-400' :
                            'bg-gray-500/20 border-gray-500/30 text-gray-400'
                        }`}>
                            <i data-lucide={cloudStatus === 'synced' ? 'cloud-upload' : cloudStatus === 'syncing' ? 'loader' : 'cloud-off'} 
                               className={`w-4 h-4 ${cloudStatus === 'syncing' ? 'animate-spin' : ''}`}></i>
                            <span>
                                {cloudStatus === 'synced' ? 'CLOUD SYNC' : 
                                 cloudStatus === 'syncing' ? 'SYNCING...' : 
                                 cloudStatus === 'error' ? 'OFFLINE' : 'CLOUD'}
                            </span>
                        </div>
                    </div> */}

                    {/* Cánh cửa bảo mật */}
                    <div className="fixed inset-0 z-[100] pointer-events-none">
                        <div className={`door-transition absolute left-0 top-0 w-1/2 h-full bg-gradient-to-r from-[#0f0f0f] to-black border-r border-cyan-500/30 z-10 pointer-events-auto flex items-end justify-center ${isUnlocked ? '-translate-x-full' : 'translate-x-0'}`}>
                            {!isUnlocked && <div className="mr-[-2px] h-32 w-1 bg-cyan-400 shadow-[0_0_20px_cyan] animate-pulse" />}
                        </div>
                        <div className={`door-transition absolute right-0 top-0 w-1/2 h-full bg-gradient-to-l from-[#0f0f0f] to-black border-l border-cyan-500/30 z-10 pointer-events-auto flex items-start justify-center ${isUnlocked ? 'translate-x-full' : 'translate-x-0'}`}>
                            {!isUnlocked && <div className="ml-[-2px] h-32 w-1 bg-cyan-400 shadow-[0_0_20px_cyan] animate-pulse" />}
                        </div>
                    </div>

                    {/* Login Form */}
                    {!isUnlocked && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-4">
                            <div className="w-full max-w-md text-center">
                                <i data-lucide="shield" className="w-20 h-20 mx-auto text-cyan-400 animate-bounce drop-shadow-[0_0_15px_cyan]"></i>
                                <h1 className="mt-4 text-4xl font-black italic tracking-[0.3em] text-cyan-400 uppercase">CLOUD EDITION</h1>
                                <div className="mt-2 flex items-center justify-center gap-2 text-xs text-cyan-500/70">
                                    <i data-lucide="cloud-download" className="w-4 h-4"></i>
                                    <span>AUTO SYNC ON LOGIN</span>
                                </div>
                                <form onSubmit={handleLogin} className="mt-8 backdrop-blur-2xl bg-white/5 p-8 rounded-[40px] border border-cyan-500/30 shadow-[0_0_50px_rgba(6,182,212,0.2)] space-y-5">
                                    <div className="relative">
                                        <i data-lucide="user" className="absolute left-5 top-1/2 -translate-y-1/2 text-cyan-400 w-5 h-5"></i>
                                        <input type="text" placeholder="TÊN ĐĂNG NHẬP" className="w-full bg-black/40 border border-white/10 rounded-2xl py-4 pl-12 pr-4 focus:border-cyan-400 outline-none glow-input uppercase" value={username} onChange={(e)=>setUsername(e.target.value)} required />
                                    </div>
                                    <div className="relative">
                                        <i data-lucide="lock" className="absolute left-5 top-1/2 -translate-y-1/2 text-cyan-400 w-5 h-5"></i>
                                        <input type={showPasswordField?"text":"password"} placeholder="MẬT KHẨU" className="w-full bg-black/40 border border-white/10 rounded-2xl py-4 pl-12 pr-12 focus:border-cyan-400 outline-none glow-input uppercase" value={password} onChange={(e)=>setPassword(e.target.value)} required />
                                        <button type="button" onClick={()=>setShowPasswordField(!showPasswordField)} className="absolute right-4 top-1/2 -translate-y-1/2 text-cyan-400/70">
                                            <i data-lucide={showPasswordField?"eye-off":"eye"} className="w-5 h-5"></i>
                                        </button>
                                    </div>
                                    <div className="flex items-center justify-between text-xs">
                                        <label className="flex items-center gap-2 text-gray-400">
                                            <input type="checkbox" checked={rememberMe} onChange={(e)=>setRememberMe(e.target.checked)} className="form-checkbox rounded bg-black border-cyan-400 text-cyan-400" /> Ghi nhớ
                                        </label>
                                        <button type="button" onClick={()=>{setShowForgotModal(true); setForgotStep(1);}} className="text-cyan-400 hover:underline">Quên mật khẩu?</button>
                                    </div>
                                    <button className="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-black font-black rounded-2xl shadow-[0_0_25px_rgba(6,182,212,0.6)] active:scale-95 transition-all uppercase">Đăng nhập</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Dashboard */}
                    {isUnlocked && currentUser && (
                        <div className="flex h-full w-full">
                            {isSidebarOpen && <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[45]" onClick={()=>setIsSidebarOpen(false)} />}
                            
                            {/* SIDEBAR */}
                            <aside className={`fixed lg:static top-0 left-0 z-50 h-full w-[300px] bg-[#0a0a0a]/90 backdrop-blur-xl border-r border-white/5 transition-transform duration-300 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                                <div className="p-6 border-b border-white/10 flex items-center gap-4">
                                    <div className={`w-12 h-12 rounded-xl ${getAvatarClass(currentUser.avatar)} flex items-center justify-center shadow-lg avatar-image`} style={getAvatarStyle(currentUser.avatar)}>
                                        {!currentUser.avatar?.startsWith('http') && <i data-lucide="user" className="text-white w-6 h-6"></i>}
                                    </div>
                                    <div>
                                        <h2 className="text-lg font-black italic text-cyan-400 flex items-center gap-2">
                                            VNG PRO
                                            <i data-lucide="cloud" className="w-3 h-3 text-cyan-500/50"></i>
                                        </h2>
                                        <div className="mt-1 px-2 py-0.5 bg-cyan-500/20 rounded-full text-[9px] font-bold text-cyan-300 uppercase">{currentUser.displayName}</div>
                                    </div>
                                </div>

                                <div className="p-4">
                                    <div className="relative">
                                        <i data-lucide="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 w-4 h-4"></i>
                                        <input type="text" placeholder="Tìm đề thi..." className="w-full bg-black/40 border border-white/10 rounded-lg py-2 pl-10 pr-4 text-xs focus:border-cyan-500 outline-none" value={searchTerm} onChange={(e)=>setSearchTerm(e.target.value)} />
                                    </div>
                                </div>
                                
                                <nav className="flex-1 overflow-y-auto custom-scrollbar px-2">
                                    {currentUser.customExams && currentUser.customExams.length > 0 && (
                                        <>
                                            <p className="px-2 py-1 mt-2 text-[10px] font-bold text-purple-400 uppercase flex items-center gap-2">
                                                <i data-lucide="sparkles" className="w-3 h-3"></i>
                                                Đề tự thêm ({currentUser.customExams.length})
                                            </p>
                                            {filteredExams.filter(e => e.type === 'custom').map((exam) => (
                                                <button key={exam.id} onClick={()=>{setActiveIframe(exam.url); setIsSidebarOpen(false);}} className={`w-full text-left px-3 py-2.5 flex items-center gap-3 rounded-lg hover:bg-white/5 border-l-2 transition-all ${activeIframe===exam.url ? 'border-purple-500 bg-purple-500/10' : 'border-transparent text-gray-400'}`}>
                                                    <i data-lucide="link" className="w-4 h-4"></i><span className="text-xs truncate">{exam.title}</span>
                                                </button>
                                            ))}
                                        </>
                                    )}

                                    <p className="px-2 py-1 mt-4 text-[10px] font-bold text-green-600 uppercase">Đề Azota (1-{AZOTA_DATA.length})</p>
                                    {filteredExams.filter(e=>e.type==='azota').map((exam)=>(
                                        <button key={exam.id} onClick={()=>{setActiveIframe(exam.url); setIsSidebarOpen(false);}} className={`w-full text-left px-3 py-2.5 flex items-center gap-3 rounded-lg hover:bg-white/5 border-l-2 transition-all ${activeIframe===exam.url ? 'border-green-500 bg-green-500/10' : 'border-transparent text-gray-400'}`}>
                                            <i data-lucide="external-link" className="w-4 h-4"></i><span className="text-xs truncate">{exam.title}</span>
                                        </button>
                                    ))}
                                </nav>
                                
                                <div className="p-4 border-t border-white/10 space-y-2">
                                    <button 
                                        onClick={handleManualSync} 
                                        disabled={isSyncing}
                                        className="w-full flex items-center justify-center gap-2 py-2.5 bg-green-500/10 hover:bg-green-500 text-green-500 hover:text-white rounded-xl text-[10px] font-bold uppercase transition disabled:opacity-50"
                                    >
                                        <i data-lucide={isSyncing ? "loader" : "download-cloud"} className={`w-3 h-3 ${isSyncing ? 'animate-spin' : ''}`} /> 
                                        {isSyncing ? 'Đang tải...' : 'Tải dữ liệu'}
                                    </button>
                                    <button onClick={()=>{setShowForgotModal(true); setForgotStep(1);}} className="w-full flex items-center justify-center gap-2 py-2.5 bg-cyan-500/10 hover:bg-cyan-500 text-cyan-500 hover:text-black rounded-xl text-[10px] font-bold uppercase transition">
                                        <i data-lucide="key" className="w-3 h-3" /> Đổi mật khẩu
                                    </button>
                                    <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 py-2.5 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white rounded-xl text-[10px] font-bold uppercase transition">
                                        <i data-lucide="log-out" className="w-3 h-3" /> Đăng xuất
                                    </button>
                                </div>
                            </aside>

                            {/* MAIN CONTENT */}
                            <main className="flex-1 flex flex-col h-full overflow-hidden">
                                <header className="h-14 border-b border-white/10 flex items-center justify-between px-4 bg-black/40 backdrop-blur-lg">
                                    <button onClick={()=>setIsSidebarOpen(true)} className="lg:hidden p-2 text-cyan-400"><i data-lucide="menu" className="w-6 h-6"></i></button>
                                    <div className="hidden lg:block" />
                                    <div className="flex items-center gap-4">
                                        <button 
                                            onClick={handleManualSync} 
                                            disabled={isSyncing}

                                                        {Math.max(...examHistory.map(item => parseFloat(item.percentage))).toFixed(1)}%
                                                    </p>
                                                    <p className="text-[9px] text-gray-500 mt-1 uppercase">Cao nhất</p>
                                                </div>
                                            </div>
                                        )}

                                        {/* Danh sách lịch sử */}
                                        <div className="space-y-2 max-h-96 overflow-y-auto custom-scrollbar">
                                            {examHistory.length > 0 ? (
                                                examHistory.map((item) => {
                                                    const percentage = parseFloat(item.percentage);
                                                    const colorClass = percentage >= 80 ? 'border-green-500/30 bg-green-500/5' : 
                                                                      percentage >= 50 ? 'border-yellow-500/30 bg-yellow-500/5' : 
                                                                      'border-red-500/30 bg-red-500/5';
                                                    const textColor = percentage >= 80 ? 'text-green-400' : 
                                                                     percentage >= 50 ? 'text-yellow-400' : 
                                                                     'text-red-400';
                                                    
                                                    return (
                                                        <div key={item.id} className={`border rounded-xl p-3 ${colorClass}`}>
                                                            <div className="flex items-start justify-between gap-3">
                                                                <div className="flex-1 min-w-0">
                                                                    <p className="text-sm font-bold text-white truncate">{item.examName}</p>
                                                                    <div className="flex items-center gap-3 mt-1">
                                                                        <span className={`text-lg font-black ${textColor}`}>
                                                                            {item.score}/{item.maxScore}
                                                                        </span>
                                                                        <span className={`text-xs font-bold ${textColor}`}>
                                                                            ({item.percentage}%)
                                                                        </span>
                                                                    </div>
                                                                    <p className="text-[10px] text-gray-500 mt-1">
                                                                        <i data-lucide="clock" className="w-3 h-3 inline mr-1"></i>
                                                                        {item.date}
                                                                    </p>
                                                                </div>
                                                                <button 
                                                                    onClick={() => handleDeleteHistory(item.id)}
                                                                    className="p-2 bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white rounded-lg transition flex-shrink-0"
                                                                >
                                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                                </button>
                                                            </div>
                                                        </div>
                                                    );
                                                })
                                            ) : (
                                                <div className="text-center py-12">
                                                    <i data-lucide="file-text" className="w-16 h-16 mx-auto text-gray-700 mb-4"></i>
                                                    <p className="text-sm text-gray-500">Chưa có lịch sử điểm nào</p>
                                                    <p className="text-xs text-gray-600 mt-1">Nhấn + để thêm điểm mới</p>
                                                </div>
                                            )}
                                        </div>

                                        {/* Nút xóa toàn bộ */}
                                        {examHistory.length > 0 && (
                                            <button 
                                                onClick={handleClearHistory}
                                                className="w-full py-2 bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white font-bold rounded-xl transition flex items-center justify-center gap-2"
                                            >
                                                <i data-lucide="trash" className="w-4 h-4"></i>
                                                Xóa toàn bộ lịch sử
                                            </button>
                                        )}
                                    </div>
                                )}
                                
                                </div>
                            </div>
                        </div>
                    )}

                    {/* FORGOT PASSWORD MODAL */}
                    {showForgotModal && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl">
                            <div className="w-full max-w-sm bg-[#0d0d0d] border border-cyan-500/30 rounded-[32px] p-8 relative">
                                <button onClick={()=>setShowForgotModal(false)} className="absolute top-6 right-6 text-gray-500"><i data-lucide="x" className="w-5 h-5"></i></button>
                                <h2 className="text-xl font-black text-cyan-400 mb-8 flex items-center gap-3">
                                    <i data-lucide="key" /> BẢO MẬT
                                    <i data-lucide="cloud" className="w-4 h-4 text-cyan-500/50"></i>
                                </h2>
                                {forgotStep===1 && (
                                    <div className="space-y-5">
                                        <input type="text" placeholder="TÊN ĐĂNG NHẬP" className="w-full bg-black border border-white/10 rounded-2xl py-4 px-4 outline-none focus:border-cyan-500 uppercase" value={forgotUser||currentUser?.user||""} onChange={(e)=>setForgotUser(e.target.value)} disabled={!!currentUser} />
                                        <button onClick={sendForgotOtp} disabled={isLoading} className="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 text-white font-black rounded-2xl">{isLoading?"ĐANG GỬI...":"GỬI MÃ OTP"}</button>
                                    </div>
                                )}
                                {forgotStep===2 && (
                                    <div className="space-y-5">
                                        <p className="text-xs text-gray-400 text-center">Kiểm tra email để lấy mã OTP</p>
                                        <input type="number" placeholder="NHẬP MÃ OTP" className="w-full bg-black border border-white/10 rounded-2xl py-4 text-center font-black outline-none focus:border-green-500" value={inputOtp} onChange={(e)=>setInputOtp(e.target.value)} />
                                        <button onClick={verifyForgotOtp} className="w-full py-4 bg-gradient-to-r from-green-600 to-emerald-600 text-white font-black rounded-2xl">XÁC THỰC</button>
                                    </div>
                                )}
                                {forgotStep===3 && (
                                    <div className="space-y-5">
                                        <input type="password" placeholder="MẬT KHẨU MỚI" className="w-full bg-black border border-white/10 rounded-2xl py-4 px-4 outline-none focus:border-cyan-500" value={forgotNewPassword} onChange={(e)=>setForgotNewPassword(e.target.value)} />
                                        <button onClick={updateForgotPassword} className="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-600 text-black font-black rounded-2xl flex items-center justify-center gap-2">
                                            <i data-lucide="cloud-upload" className="w-4 h-4" />
                                            CẬP NHẬT & SYNC
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
