            const [maxScore, setMaxScore] = useState('10');
            return (
                <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-black/90 backdrop-blur-xl">
                    <div className="w-full max-w-sm bg-[#0d0d0d] border border-amber-500/40 rounded-[28px] p-7 shadow-[0_0_50px_rgba(251,191,36,0.2)]">
                        <div className="flex items-center gap-3 mb-6">
                            <div className="w-10 h-10 bg-amber-500/20 rounded-xl flex items-center justify-center">
                                <i data-lucide="trophy" className="w-5 h-5 text-amber-400"></i>
                            </div>
                            <div>
                                <h3 className="text-base font-black text-amber-400">LƯU KẾT QUẢ</h3>
                                <p className="text-[10px] text-gray-500 mt-0.5 truncate max-w-[200px]">{examTitle}</p>
                            </div>
                        </div>
                        <div className="space-y-4">
                            <div>
                                <label className="text-xs text-gray-400 uppercase block mb-2">Điểm của bạn</label>
                                <input
                                    type="number" step="0.25" placeholder="VD: 8.5" value={score}
                                    onChange={e=>setScore(e.target.value)}
                                    className="w-full bg-black border border-white/10 rounded-xl py-3 px-4 text-2xl font-black text-center text-amber-400 outline-none focus:border-amber-500 transition"
                                    autoFocus
                                />
                            </div>
                            <div>
                                <label className="text-xs text-gray-400 uppercase block mb-2">Tổng điểm</label>
                                <div className="grid grid-cols-3 gap-2">
                                    {['10','100','40'].map(v=>(
                                        <button key={v} onClick={()=>setMaxScore(v)} className={`py-2.5 rounded-xl text-sm font-bold transition ${maxScore===v?'bg-amber-500 text-black':'bg-white/5 text-gray-400 hover:bg-white/10'}`}>{v}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-3 pt-1">
                                <button onClick={onSkip} className="py-3 bg-white/5 hover:bg-white/10 text-gray-400 font-bold rounded-xl transition text-sm">Bỏ qua</button>
                                <button
                                    onClick={()=>{
                                        const s = parseFloat(score), m = parseFloat(maxScore);
                                        if (!score || isNaN(s)||isNaN(m)||s<0||m<=0||s>m) return;
                                        onSave({ score:s, maxScore:m });
                                    }}
                                    disabled={!score || parseFloat(score)<0}
                                    className="py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-black font-black rounded-xl transition disabled:opacity-40 text-sm flex items-center justify-center gap-2"
                                >
                                    <i data-lucide="check" className="w-4 h-4"></i>Lưu
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ════════════════════════════════════════════════════════════════════
        //  APP
        // ════════════════════════════════════════════════════════════════════
        const App = () => {
            const [users,         setUsers]         = useState([]);
            const [isUnlocked,    setIsUnlocked]    = useState(false);
            const [isAutoLogging, setIsAutoLogging] = useState(false);
            const [username,      setUsername]      = useState("");
            const [password,      setPassword]      = useState("");
            const [rememberMe,    setRememberMe]    = useState(false);
            const [currentUser,   setCurrentUser]   = useState(null);
            const [activeIframe,  setActiveIframe]  = useState("");
            const [activeExamTitle, setActiveExamTitle] = useState("");
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [searchTerm,    setSearchTerm]    = useState("");
            const [toast,         setToast]         = useState(null);
            const [showPwField,   setShowPwField]   = useState(false);
            const [isSyncing,     setIsSyncing]     = useState(false);
            const [cloudStatus,   setCloudStatus]   = useState('idle');
            const [cloudErrorMsg, setCloudErrorMsg] = useState('');

            // ── Music State (persistent) ─────────────────────────────────────
            const [showMusicBox,    setShowMusicBox]    = useState(false);
            const [videoId,         setVideoId]         = useState("");
            const [youtubeInput,    setYoutubeInput]    = useState("");
            const [isPlaying,       setIsPlaying]       = useState(false);
            const [musicHistory,    setMusicHistory]    = useState([]); // [{id, title, url, addedAt}]
            const [showMusicHistory,setShowMusicHistory]= useState(false);
            const iframeRef = useRef(null);

            // ── Auto Score Modal ─────────────────────────────────────────────
            const [showAutoScore,   setShowAutoScore]   = useState(false);
            const [pendingExamForScore, setPendingExamForScore] = useState(null);
            // Track exam sessions: { url, title, startTime }
            const examSessionRef = useRef(null);
            const examTimerRef   = useRef(null);

            // Profile modal
            const [showProfile,    setShowProfile]    = useState(false);
            const [profileTab,     setProfileTab]     = useState('info');
            const [newDisplayName, setNewDisplayName] = useState("");
            const [selAvatar,      setSelAvatar]      = useState("");
            const [avatarLink,     setAvatarLink]     = useState("");
            const [avatarLinkValid,setAvatarLinkValid]= useState(true);
            const [otpStep,        setOtpStep]        = useState(1);
            const [otpInput,       setOtpInput]       = useState("");
            const [newPw,          setNewPw]          = useState("");
            const [isLoading,      setIsLoading]      = useState(false);
            const [newExamTitle,   setNewExamTitle]   = useState("");
            const [newExamUrl,     setNewExamUrl]     = useState("");
            const otpSentRef   = useRef("");
            const forgotOtpRef = useRef("");

            // Forgot modal
            const [showForgot,  setShowForgot]  = useState(false);
            const [forgotStep,  setForgotStep]  = useState(1);
            const [forgotUser,  setForgotUser]  = useState("");
            const [inputOtp,    setInputOtp]    = useState("");
            const [forgotNewPw, setForgotNewPw] = useState("");

            // History
            const [examHistory,  setExamHistory]  = useState([]);
            const [newScore,     setNewScore]     = useState("");
            const [newExamName,  setNewExamName]  = useState("");
            const [newMaxScore,  setNewMaxScore]  = useState("");
            const [showAddScore, setShowAddScore] = useState(false);

            const usersRef       = useRef([]);
            const currentUserRef = useRef(null);
            const rememberMeRef  = useRef(false);
            const updateQueue    = useRef(Promise.resolve());
            const cloudStatusRef = useRef('idle');

            useEffect(() => { usersRef.current = users; },             [users]);
            useEffect(() => { currentUserRef.current = currentUser; }, [currentUser]);
            useEffect(() => { rememberMeRef.current = rememberMe; },   [rememberMe]);

            const setCloudStatusSafe = (status) => {
                cloudStatusRef.current = status;
                setCloudStatus(status);
                if (status === 'syncing') {
                    setTimeout(() => { if (cloudStatusRef.current === 'syncing') { cloudStatusRef.current = 'error'; setCloudStatus('error'); } }, 15000);
                }
            };

            const playSound = (src = "https://www.soundjay.com/mechanical/sounds/gun-shot-01.mp3") => new Audio(src).play().catch(()=>{});
            const showToast = useCallback((msg) => { setToast({ message: msg }); setTimeout(() => setToast(null), 3100); }, []);

            // ── Save session on every active iframe change ────────────────────
            useEffect(() => {
                const cu = currentUserRef.current;
                if (!cu || !isUnlocked) return;
                saveSession(cu.user, {
                    activeIframe,
                    activeExamTitle,
                    showMusicBox
                });
            }, [activeIframe, activeExamTitle, showMusicBox, isUnlocked]);

            // ── Save music state whenever it changes ─────────────────────────
            useEffect(() => {
                const cu = currentUserRef.current;
                if (!cu || !isUnlocked) return;
                saveMusicState(cu.user, { videoId, youtubeInput, isPlaying, musicHistory });
            }, [videoId, youtubeInput, isPlaying, musicHistory, isUnlocked]);

            // ── Restore session after login ───────────────────────────────────
            const restoreSession = useCallback((user) => {
                const sess = loadSession(user.user);
                if (sess) {
                    if (sess.activeIframe) { setActiveIframe(sess.activeIframe); setActiveExamTitle(sess.activeExamTitle || ''); }
                    if (sess.showMusicBox) setShowMusicBox(true);
                }
                const music = loadMusicState(user.user);
                if (music) {
                    if (music.videoId)     { setVideoId(music.videoId); }
                    if (music.youtubeInput){ setYoutubeInput(music.youtubeInput); }
                    if (music.musicHistory){ setMusicHistory(music.musicHistory || []); }
                    // Don't auto-resume playing on load (user needs to click play)
                    setIsPlaying(false);
                }
            }, []);

            const doLogin = useCallback((foundUser, mode='manual') => {
                setCurrentUser(foundUser);
                currentUserRef.current = foundUser;
                if (foundUser.examHistory) setExamHistory(foundUser.examHistory);
                setIsUnlocked(true);
                if (mode === 'manual') playSound();
                setCloudStatusSafe('synced');
                showToast(`✅ Chào ${foundUser.displayName}`);
                saveLocalBackup(foundUser);
                // Restore session state
                setTimeout(() => restoreSession(foundUser), 100);
            }, [showToast, restoreSession]);

            const saveRemember = (u, p) => localStorage.setItem(STORAGE.REMEMBER, JSON.stringify({ user:u, pass:p }));
            const clearRemember = () => localStorage.removeItem(STORAGE.REMEMBER);
            const getRemember = () => { try { return JSON.parse(localStorage.getItem(STORAGE.REMEMBER)); } catch { return null; } };

            // ── INIT ──────────────────────────────────────────────────────────
            useEffect(() => {
                if (window.emailjs) window.emailjs.init(EMAILJS_PUBLIC_KEY);
                const init = async () => {
                    setCloudStatusSafe('syncing');
                    const rawLocal = localStorage.getItem(STORAGE.USERS);
                    const localUsers = rawLocal ? JSON.parse(rawLocal) : null;
                    const allRes = await cloudLoadAll();
                    let latestUsers;
                    if (allRes.ok && allRes.data.length > 0) {
                        const cloudMap = {};
                        allRes.data.forEach(u => { cloudMap[u.user.toLowerCase()] = u; });
                        if (localUsers) {
                            const merged = localUsers.map(lu => { const cu = cloudMap[lu.user.toLowerCase()]; if (!cu) return lu; return (lu.localTs||0) > (cu.localTs||0) ? lu : cu; });
                            allRes.data.forEach(cu => { if (!merged.find(u => u.user.toLowerCase() === cu.user.toLowerCase())) merged.push(cu); });
                            latestUsers = merged;
                        } else { latestUsers = allRes.data; }
                        setCloudStatusSafe('synced'); setCloudErrorMsg('');
                    } else {
                        latestUsers = localUsers || DEFAULT_USERS;
                        if (allRes.ok) { for (const u of latestUsers) await cloudSave({ ...u, localTs: Date.now() }); setCloudStatusSafe('synced'); }
                        else { setCloudErrorMsg(allRes.msg || 'Unknown error'); setCloudStatusSafe('error'); }
                    }
                    setUsers(latestUsers); usersRef.current = latestUsers;
                    localStorage.setItem(STORAGE.USERS, JSON.stringify(latestUsers));
                    const rem = getRemember();
                    if (rem?.user && rem?.pass) {
                        setUsername(rem.user); setPassword(rem.pass); setRememberMe(true); rememberMeRef.current = true; setIsAutoLogging(true);
                        try {
                            const found = latestUsers.find(u => u.user.toLowerCase() === rem.user.toLowerCase() && u.pass === rem.pass);
                            if (found) { doLogin(found, 'auto'); }
                            else { clearRemember(); setUsername(""); setPassword(""); setRememberMe(false); rememberMeRef.current = false; showToast("⚠️ Phiên đăng nhập hết hạn"); }
                        } catch(e) {
                            const found = latestUsers.find(u => u.user.toLowerCase() === rem.user.toLowerCase() && u.pass === rem.pass);
                            if (found) doLogin(found, 'auto');
                        } finally { setIsAutoLogging(false); }
                    }
                };
                init();
            }, []);

            useEffect(() => { lucide.createIcons(); });

            // ── EXAM SESSION TRACKING ─────────────────────────────────────────
            // Khi mở đề, bắt đầu tracking session
            const handleOpenExam = useCallback((url, title) => {
                // Nếu đang làm bài khác, offer to save score
                if (examSessionRef.current && examSessionRef.current.url !== url) {
                    const duration = Date.now() - examSessionRef.current.startTime;
                    // Only prompt if user spent at least 30 seconds on the exam
                    if (duration > 30000) {
                        setPendingExamForScore({ url: examSessionRef.current.url, title: examSessionRef.current.title });
                        setShowAutoScore(true);
                    }
                }
                // Clear existing timer
                if (examTimerRef.current) clearTimeout(examTimerRef.current);
                // Start new session
                examSessionRef.current = { url, title, startTime: Date.now() };
                setActiveIframe(url);
                setActiveExamTitle(title);
                setIsSidebarOpen(false);
            }, []);

            // ── AUTO SCORE SAVE ──────────────────────────────────────────────
            const handleAutoScoreSave = useCallback(async ({ score, maxScore }) => {
                const cu = currentUserRef.current;
                if (!cu || !pendingExamForScore) return;
                const entry = {
                    id: Date.now(),
                    examName: pendingExamForScore.title,
                    score,
                    maxScore,
                    percentage: ((score/maxScore)*100).toFixed(1),
                    date: new Date().toLocaleString('vi-VN'),
                    autoSaved: true
                };
                const updatedHistory = [entry, ...(cu.examHistory||[])];
                await updateUser({ ...cu, examHistory: updatedHistory });
                setShowAutoScore(false);
                setPendingExamForScore(null);
                examSessionRef.current = null;
                showToast(`🏆 Đã lưu điểm: ${score}/${maxScore} (${((score/maxScore)*100).toFixed(1)}%)`);
            }, [pendingExamForScore, showToast]);

            const handleAutoScoreSkip = useCallback(() => {
                setShowAutoScore(false);
                setPendingExamForScore(null);
                examSessionRef.current = null;
            }, []);

            // Offer save score when user closes exam (navigate away)
            const handleCloseExam = useCallback(() => {
                if (examSessionRef.current) {
                    const duration = Date.now() - examSessionRef.current.startTime;
                    if (duration > 30000) {
                        setPendingExamForScore({ url: examSessionRef.current.url, title: examSessionRef.current.title });
                        setShowAutoScore(true);
                    } else {
                        examSessionRef.current = null;
                    }
                }
                setActiveIframe('');
                setActiveExamTitle('');
            }, []);

            // ── LOGIN ─────────────────────────────────────────────────────────
            const handleLogin = async (e) => {
                e.preventDefault();
                setCloudStatusSafe('syncing');
                showToast('🔄 Đang xác thực...');
                try {
                    const res = await cloudLoad(username);
                    let found = (res.ok && res.data) ? res.data : null;
                    if (found && found.pass === password) {
                        const localMatch = usersRef.current.find(u => u.user.toLowerCase() === found.user.toLowerCase());
                        const winner = (localMatch?.localTs||0) > (found.localTs||0) ? localMatch : found;
                        const merged = usersRef.current.map(u => u.user.toLowerCase() === winner.user.toLowerCase() ? winner : u);
                        setUsers(merged); usersRef.current = merged;
                        localStorage.setItem(STORAGE.USERS, JSON.stringify(merged));
                        if (rememberMeRef.current) saveRemember(winner.user, winner.pass); else clearRemember();
                        doLogin(winner, 'manual');
                    } else {
                        const local = usersRef.current.find(u => u.user.toLowerCase() === username.toLowerCase() && u.pass === password);
                        if (local) { if (rememberMeRef.current) saveRemember(local.user, local.pass); else clearRemember(); doLogin(local, 'manual'); showToast(`✅ Đăng nhập offline (${local.displayName})`); }
                        else { showToast("❌ Sai tài khoản hoặc mật khẩu"); setCloudStatusSafe('error'); }
                    }
                } catch(err) { console.error(err); showToast("❌ Có lỗi xảy ra"); setCloudStatusSafe('error'); }
            };

            // ── LOGOUT ────────────────────────────────────────────────────────
            const handleLogout = () => {
                // Save score before logout if exam is open
                if (examSessionRef.current) {
                    const dur = Date.now() - examSessionRef.current.startTime;
                    if (dur > 30000) {
                        setPendingExamForScore({ url: examSessionRef.current.url, title: examSessionRef.current.title });
                        setShowAutoScore(true);
                        return; // Wait for user to handle score first
                    }
                }
                _doLogout();
            };
            const _doLogout = () => {
                setIsUnlocked(false);
                playSound("https://www.soundjay.com/mechanical/sounds/iron-gate-close-1.mp3");
                if (!rememberMeRef.current) clearRemember();
                setTimeout(() => {
                    setCurrentUser(null); currentUserRef.current = null;
                    setUsername(""); setPassword(""); setActiveIframe(""); setActiveExamTitle("");
                    setIsSidebarOpen(false); setVideoId(""); setYoutubeInput("");
                    setIsPlaying(false); examSessionRef.current = null;
                }, 1200);
                showToast("Đã đăng xuất");
            };

            const updateUser = useCallback((updated, silent = false) => {
                const updatedWithTs = { ...updated, localTs: Date.now() };
                updateQueue.current = updateQueue.current.then(async () => {
                    try {
                        setCloudStatusSafe('syncing');
                        const merged = usersRef.current.map(u => u.user === updatedWithTs.user ? updatedWithTs : u);
                        setUsers(merged); usersRef.current = merged;
                        setCurrentUser(updatedWithTs); currentUserRef.current = updatedWithTs;
                        if (updatedWithTs.examHistory) setExamHistory(updatedWithTs.examHistory);
                        localStorage.setItem(STORAGE.USERS, JSON.stringify(merged));
                        if (rememberMeRef.current) saveRemember(updatedWithTs.user, updatedWithTs.pass);
                        const res = await cloudSave(updatedWithTs);
                        if (res?.ok) { setCloudStatusSafe('synced'); if (!silent) showToast('☁️ Đã lưu & đồng bộ cloud'); }
                        else { setCloudStatusSafe('error'); if (!silent) showToast('⚠️ Đã lưu local, cloud lỗi'); setTimeout(() => { cloudSave(updatedWithTs).then(r => { if (r?.ok) { setCloudStatusSafe('synced'); } }).catch(()=>{}); }, 5000); }
                        return merged;
                    } catch(err) { console.error('updateUser error:', err); setCloudStatusSafe('error'); if (!silent) showToast('⚠️ Có lỗi khi lưu'); }
                });
                return updateQueue.current;
            }, [showToast]);

            const handleManualSync = async () => {
                setIsSyncing(true); setCloudStatusSafe('syncing'); showToast('🔄 Đang tải dữ liệu mới nhất...');
                try {
                    const cu = currentUserRef.current; if (!cu) return;
                    const res = await cloudLoad(cu.user);
                    const fresh = (res.ok && res.data) ? res.data : null;
                    if (fresh) {
                        if ((fresh.localTs||0) > (cu.localTs||0)) {
                            const merged = usersRef.current.map(u => u.user === fresh.user ? fresh : u);
                            setUsers(merged); usersRef.current = merged; setCurrentUser(fresh); currentUserRef.current = fresh;
                            if (fresh.examHistory) setExamHistory(fresh.examHistory);
                            localStorage.setItem(STORAGE.USERS, JSON.stringify(merged));
                            if (rememberMeRef.current) saveRemember(fresh.user, fresh.pass);
                            showToast('✅ Đã cập nhật dữ liệu mới từ cloud!');
                        } else if ((cu.localTs||0) > (fresh.localTs||0)) { await cloudSave(cu); showToast('☁️ Local mới hơn – đã đẩy lên cloud!'); }
                        else { showToast('✅ Dữ liệu đã đồng bộ'); }
                        setCloudStatusSafe('synced');
                    } else {
                        const saveRes = await cloudSave(cu);
                        if (saveRes?.ok) { showToast('🔄 Đã khôi phục & đẩy lên cloud!'); setCloudStatusSafe('synced'); }
                        else { showToast('⚠️ Không thể đẩy lên cloud'); setCloudStatusSafe('error'); }
                    }
                } catch(e) { showToast('⚠️ Lỗi kết nối'); setCloudStatusSafe('error'); }
                finally { setIsSyncing(false); }
            };

            const handleAddCustomExam = async () => {
                if (!newExamTitle.trim() || !newExamUrl.trim()) return showToast("Nhập đủ tiêu đề và link");
                if (!newExamUrl.startsWith('http')) return showToast("Link phải bắt đầu bằng http://");
                const updated = { ...currentUserRef.current, customExams:[...(currentUserRef.current.customExams||[]), { title:newExamTitle, url:newExamUrl }] };
                await updateUser(updated); setNewExamTitle(""); setNewExamUrl(""); showToast("✅ Đã thêm đề mới");
            };
            const handleDeleteCustomExam = async (idx) => {
                const updated = { ...currentUserRef.current, customExams: currentUserRef.current.customExams.filter((_,i)=>i!==idx) };
                await updateUser(updated); showToast("✅ Đã xóa");
            };

            const openProfile = () => {
                const cu = currentUserRef.current; if (!cu) return;
                setNewDisplayName(cu.displayName);
                if (isImageUrl(cu.avatar)) { setAvatarLink(cu.avatar); setSelAvatar(""); } else { setAvatarLink(""); setSelAvatar(cu.avatar || 'bg-cyan-500'); }
                setAvatarLinkValid(true); setProfileTab('info'); setOtpStep(1); setOtpInput(""); setNewPw(""); setNewExamTitle(""); setNewExamUrl(""); otpSentRef.current = ""; setShowProfile(true);
            };

            const handleAvatarLinkChange = (val) => {
                setAvatarLink(val);
                if (!val) { setAvatarLinkValid(true); const cu = currentUserRef.current; if (cu && !isImageUrl(cu.avatar)) setSelAvatar(cu.avatar); return; }
                setAvatarLinkValid(val.startsWith('http'));
                if (val.startsWith('http')) setSelAvatar("");
            };

            const previewAvatar = useMemo(() => {
                if (avatarLink && avatarLink.startsWith('http')) return avatarLink;
                if (selAvatar) return selAvatar;
                return currentUser?.avatar || 'bg-cyan-500';
            }, [avatarLink, selAvatar, currentUser?.avatar]);

            const handleUpdateProfile = async () => {
                const cu = currentUserRef.current; if (!cu) return;
                let finalAvatar;
                if (avatarLink && avatarLink.startsWith('http')) { finalAvatar = avatarLink; }
                else if (selAvatar && !isImageUrl(selAvatar)) { finalAvatar = selAvatar; }
                else { finalAvatar = cu.avatar; }
                await updateUser({ ...cu, displayName: newDisplayName.trim() || cu.displayName, avatar: finalAvatar }, true);
                showToast("✅ Đã lưu và đồng bộ lên cloud"); setShowProfile(false);
            };

            const sendOtpForPassword = async () => {
                const cu = currentUserRef.current; if (!cu) return;
                setIsLoading(true);
                const otp = Math.floor(100000 + Math.random() * 900000).toString();
                otpSentRef.current = otp;
                try { await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { otp_code: otp, to_email: cu.email, user_name: cu.displayName }); setOtpStep(2); showToast("✅ Mã OTP đã gửi đến email"); }
                catch(e) { showToast("❌ Gửi email thất bại: " + (e.text || e.message)); }
                finally { setIsLoading(false); }
            };
            const verifyOtpAndChangePassword = async () => {
                if (otpInput.trim() !== otpSentRef.current) return showToast("❌ Mã OTP không đúng");
                if (newPw.length < 6) return showToast("Mật khẩu tối thiểu 6 ký tự");
                await updateUser({ ...currentUserRef.current, pass: newPw }); showToast("✅ Mật khẩu đã thay đổi"); setShowProfile(false);
            };

            const sendForgotOtp = async () => {
                const target = forgotUser || currentUserRef.current?.user;
                const userFound = usersRef.current.find(u => u.user.toLowerCase() === target?.toLowerCase());
                if (!userFound) return showToast("❌ Tài khoản không tồn tại");
                setIsLoading(true);
                const otp = Math.floor(100000 + Math.random() * 900000).toString();
                forgotOtpRef.current = otp;
                try { await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { otp_code: otp, to_email: userFound.email, user_name: userFound.displayName }); setForgotStep(2); showToast("✅ Mã OTP đã gửi đến email"); }
                catch(e) { showToast("❌ Gửi mail thất bại"); }
                finally { setIsLoading(false); }
            };
            const verifyForgotOtp = () => { if (inputOtp.trim() === forgotOtpRef.current) setForgotStep(3); else showToast("❌ Mã OTP không đúng"); };
            const updateForgotPassword = async () => {

                                {forgotStep===3 && (
                                    <div className="space-y-5">
                                        <input type="password" placeholder="MẬT KHẨU MỚI (tối thiểu 6 ký tự)" className="w-full bg-black border border-white/10 rounded-2xl py-4 px-4 outline-none focus:border-cyan-500" value={forgotNewPw} onChange={e=>setForgotNewPw(e.target.value)} />
                                        <button onClick={updateForgotPassword} className="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-600 text-black font-black rounded-2xl flex items-center justify-center gap-2"><i data-lucide="cloud-upload" className="w-4 h-4" />CẬP NHẬT & SYNC CLOUD</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
