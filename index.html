        // FIX 1: cloudSave có retry + soft-delete flag (deleted:false)
        // Firestore Rules đã chặn DELETE → field này là bảo vệ thêm ở tầng data
        const cloudSave = async (u, retries = 3) => {
            const { localTs, ...cloudData } = u;
            const payload = {
                ...cloudData,
                customExams:  cloudData.customExams  || [],
                examHistory:  cloudData.examHistory  || [],
                deleted:      false,                          // 🛡️ SOFT-DELETE: không bao giờ set true từ client
                lastUpdated:  firebase.firestore.FieldValue.serverTimestamp(),
                localTs:      localTs || Date.now()
            };
            for (let i = 0; i < retries; i++) {
                try {
                    await db.collection('users').doc(u.user.toLowerCase()).set(payload);
                    saveLocalBackup({ ...payload, localTs: payload.localTs }); // 💾 backup sau mỗi save thành công
                    return { ok: true };
                } catch(e) {
                    console.warn(`cloudSave attempt ${i+1} failed:`, e.code || e.message);
                    if (i < retries - 1) {
                        await new Promise(r => setTimeout(r, 800 * Math.pow(2, i)));
                    } else {
                        return { ok: false, msg: e.code || e.message || String(e) };
                    }
                }
            }
        };

                // Nếu bị đánh dấu xoá (ai đó set deleted:true bằng cách nào đó) → coi như không có
                if (data.deleted === true) return { ok: true, data: null };

                        // FIX 3: Merge cloud + local, giữ bản MỚI HƠN theo localTs
                        const cloudMap = {};
                        allRes.data.forEach(u => { cloudMap[u.user.toLowerCase()] = u; });

                        if (localUsers) {
                            // Với mỗi user local, so sánh timestamp với cloud
                            const merged = localUsers.map(lu => {
                                const cu = cloudMap[lu.user.toLowerCase()];
                                if (!cu) return lu; // chỉ có local → giữ local
                                const localTs  = lu.localTs  || 0;
                                const cloudTs  = cu.localTs  || 0;
                                return localTs > cloudTs ? lu : cu; // ai mới hơn thắng
                            });
                            // Thêm user chỉ có trên cloud
                            allRes.data.forEach(cu => {
                                if (!merged.find(u => u.user.toLowerCase() === cu.user.toLowerCase()))
                                    merged.push(cu);
                            });
                            latestUsers = merged;
                        } else {
                            latestUsers = allRes.data;
                        }

                        setUsers(latestUsers);
                        usersRef.current = latestUsers;
                        localStorage.setItem(STORAGE.USERS, JSON.stringify(latestUsers));
                        setCloudStatusSafe('synced');
                        setCloudErrorMsg('');
                    } else {
                        // FIX 4: Nếu cloud lỗi → dùng local, KHÔNG seed DEFAULT_USERS lên cloud
                        if (!allRes.ok) {
                            setCloudErrorMsg(allRes.msg || 'Unknown error');
                            setCloudStatusSafe('error');
                            latestUsers = localUsers || DEFAULT_USERS;
                        } else {
                            // Cloud trống hoàn toàn (mới) → seed DEFAULT_USERS lên cloud
                            latestUsers = localUsers || DEFAULT_USERS;
                            for (const u of latestUsers) await cloudSave({ ...u, localTs: Date.now() });
                            setCloudStatusSafe('synced');
                        }
                        setUsers(latestUsers);
                        usersRef.current = latestUsers;
                        localStorage.setItem(STORAGE.USERS, JSON.stringify(latestUsers));
                    }

                    // Auto-login từ remember
                    const rem = getRemember();
                    if (rem?.user && rem?.pass) {
                        setUsername(rem.user);
                        setPassword(rem.pass);
                        setRememberMe(true);
                        rememberMeRef.current = true;
                        setIsAutoLogging(true);

                        try {
                            const found = latestUsers.find(
                                u => u.user.toLowerCase() === rem.user.toLowerCase() && u.pass === rem.pass
                            );

                            if (found) {
                                doLogin(found, 'auto');
                            } else {
                                clearRemember();
                                setUsername(""); setPassword(""); setRememberMe(false);
                                rememberMeRef.current = false;
                                showToast("⚠️ Phiên đăng nhập hết hạn, vui lòng đăng nhập lại");
                            }
                        } catch(e) {
                            const found = latestUsers.find(u => u.user.toLowerCase() === rem.user.toLowerCase() && u.pass === rem.pass);
                            if (found) doLogin(found, 'auto');
                        } finally {
                            setIsAutoLogging(false);
                        }
                    }
                };

                init();
            }, []);

            useEffect(() => { lucide.createIcons(); });

            // ── LOGIN ────────────────────────────────────────────────────────
            const handleLogin = async (e) => {
                e.preventDefault();
                setCloudStatusSafe('syncing');
                showToast('🔄 Đang xác thực...');

                try {
                    const res = await cloudLoad(username);
                    let found = (res.ok && res.data) ? res.data : null;

                    if (found && found.pass === password) {
                        // FIX 5: Khi login, merge cloud với local (giữ bản mới nhất)
                        const localMatch = usersRef.current.find(u => u.user.toLowerCase() === found.user.toLowerCase());
                        const localTs = localMatch?.localTs || 0;
                        const cloudTs = found.localTs || 0;
                        const winner = localTs > cloudTs ? localMatch : found;

                        // Nếu local mới hơn → push lên cloud ngay
                        if (localTs > cloudTs && localMatch) {
                            cloudSave(localMatch).catch(() => {}); // async, không block login
                        }

                        const merged = usersRef.current.map(u =>
                            u.user.toLowerCase() === winner.user.toLowerCase() ? winner : u
                        );
                        setUsers(merged);
                        usersRef.current = merged;
                        localStorage.setItem(STORAGE.USERS, JSON.stringify(merged));
                        if (rememberMeRef.current) saveRemember(winner.user, winner.pass);
                        else clearRemember();
                        doLogin(winner, 'manual');
                    } else {
                        const local = usersRef.current.find(u =>
                            u.user.toLowerCase() === username.toLowerCase() && u.pass === password
                        );
                        if (local) {
                            if (rememberMeRef.current) saveRemember(local.user, local.pass);
                            else clearRemember();
                            doLogin(local, 'manual');
                            showToast(`✅ Đăng nhập offline (${local.displayName})`);
                        } else {
                            showToast("❌ Sai tài khoản hoặc mật khẩu");
                            setCloudStatusSafe('error');
                        }
                    }
                } catch(err) {
                    console.error(err);
                    showToast("❌ Có lỗi xảy ra");
                    setCloudStatusSafe('error');
                }
            };

            // ── LOGOUT ───────────────────────────────────────────────────────
            const handleLogout = () => {
                setIsUnlocked(false);
                playSound("https://www.soundjay.com/mechanical/sounds/iron-gate-close-1.mp3");
                if (!rememberMeRef.current) clearRemember();
                setTimeout(() => {
                    setCurrentUser(null);
                    currentUserRef.current = null;
                    setUsername("");
                    setPassword("");
                    setActiveIframe("");
                    setIsSidebarOpen(false);
                }, 1200);
                showToast("Đã đăng xuất");
            };

            // FIX 6: updateUser có queue – serialise mọi write, chống race condition hoàn toàn
            const updateUser = useCallback((updated, silent = false) => {
                // Gắn timestamp local để dùng khi so sánh với cloud
                const updatedWithTs = { ...updated, localTs: Date.now() };

                // Enqueue: chờ operation trước hoàn thành rồi mới chạy cái này
                updateQueue.current = updateQueue.current.then(async () => {
                    try {
                        setCloudStatusSafe('syncing');

                        // Đọc snapshot mới nhất từ ref (không dùng closure cũ)
                        const currentSnapshot = usersRef.current;
                        const merged = currentSnapshot.map(u =>
                            u.user === updatedWithTs.user ? updatedWithTs : u
                        );

                        // Cập nhật state + local storage ngay lập tức (optimistic update)
                        setUsers(merged);
                        usersRef.current = merged;
                        setCurrentUser(updatedWithTs);
                        currentUserRef.current = updatedWithTs;
                        if (updatedWithTs.examHistory) setExamHistory(updatedWithTs.examHistory);
                        localStorage.setItem(STORAGE.USERS, JSON.stringify(merged));
                        if (rememberMeRef.current) saveRemember(updatedWithTs.user, updatedWithTs.pass);

                        // Push lên cloud (có retry)
                        const res = await cloudSave(updatedWithTs);
                        if (res?.ok) {
                            setCloudStatusSafe('synced');
                            if (!silent) showToast('☁️ Đã lưu & đồng bộ cloud');
                        } else {
                            setCloudStatusSafe('error');
                            if (!silent) showToast('⚠️ Đã lưu local, cloud lỗi – sẽ thử lại');
                            // Retry ngầm sau 5 giây
                            setTimeout(() => {
                                cloudSave(updatedWithTs).then(r => {
                                    if (r?.ok) {
                                        setCloudStatusSafe('synced');
                                        showToast('☁️ Đã đồng bộ cloud (retry)');
                                    }
                                }).catch(() => {});
                            }, 5000);
                        }
                        return merged;
                    } catch(err) {
                        console.error('updateUser error:', err);
                        setCloudStatusSafe('error');
                        if (!silent) showToast('⚠️ Có lỗi khi lưu');
                    }
                });

                return updateQueue.current;
            }, [showToast]);

            // ── MANUAL SYNC ──────────────────────────────────────────────────
            // FIX 7: manualSync so sánh timestamp – không ghi đè local mới hơn
            // + tự động khôi phục từ backup khi cloud mất dữ liệu
            const handleManualSync = async () => {
                setIsSyncing(true);
                setCloudStatusSafe('syncing');
                showToast('🔄 Đang tải dữ liệu mới nhất...');
                try {
                    const cu = currentUserRef.current;
                    if (!cu) return;
                    const res = await cloudLoad(cu.user);
                    const fresh = (res.ok && res.data) ? res.data : null;
                    if (fresh) {
                        const localTs = cu.localTs || 0;
                        const cloudTs = fresh.localTs || 0;

                        if (cloudTs > localTs) {
                            // Cloud mới hơn → áp dụng
                            const merged = usersRef.current.map(u => u.user === fresh.user ? fresh : u);
                            setUsers(merged);
                            usersRef.current = merged;
                            setCurrentUser(fresh);
                            currentUserRef.current = fresh;
                            if (fresh.examHistory) setExamHistory(fresh.examHistory);
                            localStorage.setItem(STORAGE.USERS, JSON.stringify(merged));
                            if (rememberMeRef.current) saveRemember(fresh.user, fresh.pass);
                            showToast('✅ Đã cập nhật dữ liệu mới từ cloud!');
                        } else if (localTs > cloudTs) {
                            // Local mới hơn → push lên cloud
                            await cloudSave(cu);
                            showToast('☁️ Local mới hơn – đã đẩy lên cloud!');
                        } else {
                            showToast('✅ Dữ liệu đã đồng bộ, không có gì mới');
                        }
                        setCloudStatusSafe('synced');
                    } else {
                        // 🛡️ Cloud không có dữ liệu → thử khôi phục từ backup local
                        const backup = loadLocalBackup(cu.user);
                        const restoreSource = backup && (backup.localTs || 0) >= (cu.localTs || 0) ? backup : cu;

                        const saveRes = await cloudSave(restoreSource);
                        if (saveRes?.ok) {
                            showToast('🔄 Đã khôi phục & đẩy dữ liệu lên cloud!');
                            setCloudStatusSafe('synced');
                        } else {
                            showToast('⚠️ Không thể đẩy lên cloud, kiểm tra kết nối');
                            setCloudStatusSafe('error');
                        }
                    }
                } catch(e) {
                    showToast('⚠️ Lỗi kết nối');
                    setCloudStatusSafe('error');
                } finally {
                    setIsSyncing(false);
                }
            };

            // ── ADD CUSTOM EXAM ──────────────────────────────────────────────
            const handleAddCustomExam = async () => {
                if (!newExamTitle.trim() || !newExamUrl.trim()) return showToast("Nhập đủ tiêu đề và link");
                if (!newExamUrl.startsWith('http')) return showToast("Link phải bắt đầu bằng http://");
                const updated = { ...currentUserRef.current, customExams:[...(currentUserRef.current.customExams||[]), { title:newExamTitle, url:newExamUrl }] };
                await updateUser(updated);
                setNewExamTitle(""); setNewExamUrl("");
                showToast("✅ Đã thêm đề mới");
            };

            const handleDeleteCustomExam = async (idx) => {
                const updated = { ...currentUserRef.current, customExams: currentUserRef.current.customExams.filter((_,i)=>i!==idx) };
                await updateUser(updated);
                showToast("✅ Đã xóa");
            };

            // ── PROFILE OPEN ─────────────────────────────────────────────────
            const openProfile = () => {
                const cu = currentUserRef.current;
                if (!cu) return;
                setNewDisplayName(cu.displayName);
                setSelAvatar(cu.avatar);
                setAvatarLink(isImageUrl(cu.avatar) ? cu.avatar : "");
                setAvatarLinkValid(true);
                setProfileTab('info');
                setOtpStep(1); setOtpInput(""); setNewPw("");
                setNewExamTitle(""); setNewExamUrl("");
                otpSentRef.current = "";
                setShowProfile(true);
            };

            const handleAvatarLinkChange = (val) => {
                setAvatarLink(val);
                if (!val) { setAvatarLinkValid(true); return; }
                setAvatarLinkValid(val.startsWith('http'));
            };

            // ── UPDATE PROFILE ───────────────────────────────────────────────
            const handleUpdateProfile = async () => {
                const cu = currentUserRef.current;
                let finalAvatar = cu.avatar;
                if (avatarLink && avatarLink.startsWith('http')) {
                    finalAvatar = avatarLink;
                } else if (!avatarLink && selAvatar) {
                    finalAvatar = selAvatar;
                }
                const updated = {
                    ...cu,
                    displayName: newDisplayName || cu.displayName,
                    avatar: finalAvatar
                };
                await updateUser(updated, true);
                showToast("✅ Đã lưu và đồng bộ lên cloud");
                setShowProfile(false);
            };

            // ── OTP ĐỔI MẬT KHẨU ────────────────────────────────────────────
            const sendOtpForPassword = async () => {
                const cu = currentUserRef.current;
                if (!cu) return;
                setIsLoading(true);
                const otp = Math.floor(100000 + Math.random() * 900000).toString();
                otpSentRef.current = otp;
                try {
                    await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                        otp_code: otp, to_email: cu.email, user_name: cu.displayName
                    });
                    setOtpStep(2);
                    showToast("✅ Mã OTP đã gửi đến email");
                } catch(e) {
                    showToast("❌ Gửi email thất bại: " + (e.text || e.message));
                } finally { setIsLoading(false); }
            };

            const verifyOtpAndChangePassword = async () => {
                if (otpInput.trim() !== otpSentRef.current) return showToast("❌ Mã OTP không đúng");
                if (newPw.length < 6) return showToast("Mật khẩu tối thiểu 6 ký tự");
                const updated = { ...currentUserRef.current, pass: newPw };
                await updateUser(updated);
                showToast("✅ Mật khẩu đã thay đổi & sync cloud");
                setShowProfile(false);
            };

            // ── FORGOT PASSWORD ──────────────────────────────────────────────
            const sendForgotOtp = async () => {
                const target = forgotUser || currentUserRef.current?.user;
                const userFound = usersRef.current.find(u => u.user.toLowerCase() === target?.toLowerCase());
                if (!userFound) return showToast("❌ Tài khoản không tồn tại");
                setIsLoading(true);
                const otp = Math.floor(100000 + Math.random() * 900000).toString();
                forgotOtpRef.current = otp;
                try {
                    await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                        otp_code: otp, to_email: userFound.email, user_name: userFound.displayName
                    });
                    setForgotStep(2);
                    showToast("✅ Mã OTP đã gửi đến email");
                } catch(e) {
                    showToast("❌ Gửi mail thất bại");
                } finally { setIsLoading(false); }
            };

            const verifyForgotOtp = () => {
                if (inputOtp.trim() === forgotOtpRef.current) setForgotStep(3);
                else showToast("❌ Mã OTP không đúng");
            };

            const updateForgotPassword = async () => {
                if (forgotNewPw.length < 6) return showToast("Mật khẩu tối thiểu 6 ký tự");
                const target = forgotUser || currentUserRef.current?.user;
                const idx = usersRef.current.findIndex(u => u.user.toLowerCase() === target?.toLowerCase());
                if (idx !== -1) {
                    const updated = { ...usersRef.current[idx], pass: forgotNewPw };
                    await updateUser(updated);
                    showToast("✅ Mật khẩu đã cập nhật & sync cloud");
                    setShowForgot(false);
                }
            };

            // ── HISTORY ──────────────────────────────────────────────────────
            const handleAddScore = async () => {
                if (!newExamName.trim() || !newScore.trim() || !newMaxScore.trim())
                    return showToast("❌ Nhập đủ thông tin");
                const s = parseFloat(newScore), m = parseFloat(newMaxScore);
                if (isNaN(s)||isNaN(m)||s<0||m<=0||s>m) return showToast("❌ Điểm số không hợp lệ");
                const entry = { id:Date.now(), examName:newExamName, score:s, maxScore:m, percentage:((s/m)*100).toFixed(1), date:new Date().toLocaleString('vi-VN') };
                const updatedHistory = [entry, ...(currentUserRef.current.examHistory||[])];
                await updateUser({ ...currentUserRef.current, examHistory:updatedHistory });
                setNewExamName(""); setNewScore(""); setNewMaxScore(""); setShowAddScore(false);
                showToast("✅ Đã thêm điểm");
            };

            const handleDeleteHistory = async (id) => {
                const cu = currentUserRef.current;
                await updateUser({ ...cu, examHistory: (cu.examHistory||[]).filter(i=>i.id!==id) });
                showToast("✅ Đã xóa");
            };

            const handleClearHistory = async () => {
                if (!confirm("⚠️ Xóa toàn bộ lịch sử điểm? Không thể hoàn tác!")) return;
                await updateUser({ ...currentUserRef.current, examHistory:[] });
                showToast("✅ Đã xóa toàn bộ");
            };

            // ── FILTERED EXAMS ───────────────────────────────────────────────
            const filteredExams = useMemo(() => {
                const all = AZOTA_DATA.map((item,i) => ({ type:'azota', title:`Đề ${i+1}: ${item.n}`, url:item.u, id:i+1 }));
                (currentUser?.customExams||[]).forEach((e,idx) =>
                    all.push({ type:'custom', title:e.title, url:e.url, id:`c-${idx}` })
                );
                return all.filter(e => e.title.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [searchTerm, currentUser?.customExams]);

            const handleYoutubeInput = (e) => {
                setYoutubeInput(e.target.value);
                const id = extractYoutubeId(e.target.value);
                if (id) setVideoId(id);
            };

            const previewAvatar = avatarLink && avatarLink.startsWith('http') ? avatarLink
                : (selAvatar || currentUser?.avatar || 'bg-cyan-500');

            // ════════════════════════════════════════════════════════════════
            //  RENDER
            // ════════════════════════════════════════════════════════════════
            return (
                <div className="relative w-full h-screen text-white overflow-hidden">
                    {toast && <Toast message={toast.message} onClose={()=>setToast(null)} />}

                    {/* AUTO-LOGIN LOADING OVERLAY */}
                    {isAutoLogging && (
                        <div className="fixed inset-0 z-[500] flex flex-col items-center justify-center bg-black/95 backdrop-blur-xl">
                            <i data-lucide="cloud-download" className="w-16 h-16 text-cyan-400 mb-6 animate-pulse"></i>
                            <p className="text-cyan-400 font-black text-xl italic tracking-widest uppercase loading-dots">Đang tải</p>
                            <p className="text-gray-500 text-xs mt-3">Đang tải dữ liệu mới nhất từ cloud</p>
                        </div>
                    )}

                    {/* CÁNH CỬA */}
                    <div className="fixed inset-0 z-[100] pointer-events-none">
                        <div className={`door-transition absolute left-0 top-0 w-1/2 h-full bg-gradient-to-r from-[#0f0f0f] to-black border-r border-cyan-500/30 z-10 pointer-events-auto flex items-end justify-center ${isUnlocked ? '-translate-x-full' : 'translate-x-0'}`}>
                            {!isUnlocked && <div className="mr-[-2px] h-32 w-1 bg-cyan-400 shadow-[0_0_20px_cyan] animate-pulse" />}
                        </div>
                        <div className={`door-transition absolute right-0 top-0 w-1/2 h-full bg-gradient-to-l from-[#0f0f0f] to-black border-l border-cyan-500/30 z-10 pointer-events-auto flex items-start justify-center ${isUnlocked ? 'translate-x-full' : 'translate-x-0'}`}>
                            {!isUnlocked && <div className="ml-[-2px] h-32 w-1 bg-cyan-400 shadow-[0_0_20px_cyan] animate-pulse" />}
                        </div>
                    </div>

                    {/* LOGIN FORM */}
                    {!isUnlocked && !isAutoLogging && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-4">
                            <div className="w-full max-w-md text-center">
                                <i data-lucide="shield" className="w-20 h-20 mx-auto text-cyan-400 animate-bounce drop-shadow-[0_0_15px_cyan]"></i>
                                <h1 className="mt-4 text-4xl font-black italic tracking-[0.3em] text-cyan-400 uppercase">CLOUD EDITION</h1>
                                <div className="mt-2 flex items-center justify-center gap-2 text-xs text-cyan-500/70">
                                    <i data-lucide="cloud-download" className="w-4 h-4"></i>
                                    <span>AUTO SYNC ON LOGIN</span>
                                </div>
                                <form onSubmit={handleLogin} className="mt-8 backdrop-blur-2xl bg-white/5 p-8 rounded-[40px] border border-cyan-500/30 shadow-[0_0_50px_rgba(6,182,212,0.2)] space-y-5">
                                    <div className="relative">
                                        <i data-lucide="user" className="absolute left-5 top-1/2 -translate-y-1/2 text-cyan-400 w-5 h-5"></i>
                                        <input type="text" placeholder="TÊN ĐĂNG NHẬP" className="w-full bg-black/40 border border-white/10 rounded-2xl py-4 pl-12 pr-4 focus:border-cyan-400 outline-none glow-input uppercase" value={username} onChange={e=>setUsername(e.target.value)} required />
                                    </div>
                                    <div className="relative">
                                        <i data-lucide="lock" className="absolute left-5 top-1/2 -translate-y-1/2 text-cyan-400 w-5 h-5"></i>
                                        <input type={showPwField?"text":"password"} placeholder="MẬT KHẨU" className="w-full bg-black/40 border border-white/10 rounded-2xl py-4 pl-12 pr-12 focus:border-cyan-400 outline-none glow-input" value={password} onChange={e=>setPassword(e.target.value)} required />
                                        <button type="button" onClick={()=>setShowPwField(!showPwField)} className="absolute right-4 top-1/2 -translate-y-1/2 text-cyan-400/70">
                                            <i data-lucide={showPwField?"eye-off":"eye"} className="w-5 h-5"></i>
                                        </button>
                                    </div>
                                    <div className="flex items-center justify-between text-xs">
                                        <label className="flex items-center gap-3 cursor-pointer select-none">
                                            <div onClick={()=>setRememberMe(v=>!v)} className={`w-11 h-6 rounded-full transition-all duration-300 relative ${rememberMe ? 'bg-cyan-500' : 'bg-white/10 border border-white/20'}`}>
                                                <div className={`absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all duration-300 ${rememberMe ? 'left-5' : 'left-0.5'}`}></div>
                                            </div>
                                            <span className={rememberMe ? 'text-cyan-400 font-bold' : 'text-gray-400'}>
                                                {rememberMe ? '✓ Ghi nhớ đăng nhập' : 'Ghi nhớ đăng nhập'}
                                            </span>
                                        </label>
                                        <button type="button" onClick={()=>{setShowForgot(true); setForgotStep(1); setForgotUser(""); setInputOtp(""); setForgotNewPw(""); forgotOtpRef.current="";}} className="text-cyan-400 hover:underline">Quên mật khẩu?</button>
                                    </div>
                                    {rememberMe && (
                                        <div className="flex items-center gap-2 bg-cyan-500/10 border border-cyan-500/30 rounded-xl px-4 py-2">
                                            <i data-lucide="info" className="w-4 h-4 text-cyan-400 flex-shrink-0"></i>
                                            <p className="text-[10px] text-cyan-300">Lần sau mở app sẽ tự đăng nhập và tải dữ liệu mới nhất từ cloud</p>
                                        </div>
                                    )}
                                    <button className="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-black font-black rounded-2xl shadow-[0_0_25px_rgba(6,182,212,0.6)] active:scale-95 transition-all uppercase tracking-widest">
                                        Đăng nhập
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* DASHBOARD */}
                    {isUnlocked && currentUser && (
                        <div className="flex h-full w-full">
                            {isSidebarOpen && <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[45]" onClick={()=>setIsSidebarOpen(false)} />}

                            {/* SIDEBAR */}

                                            {showAddScore && (
                                                <div className="bg-white/5 rounded-2xl p-4 space-y-3 border border-orange-500/30">
                                                    <input type="text" placeholder="Tên bài thi/đề thi" value={newExamName} onChange={e=>setNewExamName(e.target.value)} className="w-full bg-black border border-white/10 rounded-xl py-2 px-4 text-sm outline-none focus:border-orange-500 transition" />
                                                    <div className="grid grid-cols-2 gap-3">
                                                        <input type="number" step="0.25" placeholder="Điểm đạt" value={newScore} onChange={e=>setNewScore(e.target.value)} className="w-full bg-black border border-white/10 rounded-xl py-2 px-4 text-sm outline-none focus:border-orange-500 transition" />
                                                        <input type="number" step="0.25" placeholder="Tổng điểm" value={newMaxScore} onChange={e=>setNewMaxScore(e.target.value)} className="w-full bg-black border border-white/10 rounded-xl py-2 px-4 text-sm outline-none focus:border-orange-500 transition" />
                                                    </div>
                                                    <button onClick={handleAddScore} className="w-full py-2 bg-orange-500 hover:bg-orange-400 text-white font-bold rounded-xl transition flex items-center justify-center gap-2">
                                                        <i data-lucide="check" className="w-4 h-4"></i>Thêm điểm
                                                    </button>
                                                </div>
                                            )}
                                            {examHistory.length > 0 && (
                                                <div className="grid grid-cols-3 gap-2">
                                                    <div className="bg-white/5 rounded-xl p-3 text-center"><p className="text-xl font-black text-orange-400">{examHistory.length}</p><p className="text-[9px] text-gray-500 mt-1 uppercase">Bài thi</p></div>
                                                    <div className="bg-white/5 rounded-xl p-3 text-center"><p className="text-xl font-black text-green-400">{(examHistory.reduce((s,i)=>s+parseFloat(i.percentage),0)/examHistory.length).toFixed(1)}%</p><p className="text-[9px] text-gray-500 mt-1 uppercase">TB</p></div>
                                                    <div className="bg-white/5 rounded-xl p-3 text-center"><p className="text-xl font-black text-cyan-400">{Math.max(...examHistory.map(i=>parseFloat(i.percentage))).toFixed(1)}%</p><p className="text-[9px] text-gray-500 mt-1 uppercase">Cao nhất</p></div>
                                                </div>
                                            )}
                                            <div className="space-y-2 max-h-96 overflow-y-auto custom-scrollbar">
                                                {examHistory.length > 0 ? examHistory.map(item => {
                                                    const pct = parseFloat(item.percentage);
                                                    const cc = pct>=80?'border-green-500/30 bg-green-500/5':pct>=50?'border-yellow-500/30 bg-yellow-500/5':'border-red-500/30 bg-red-500/5';
                                                    const tc = pct>=80?'text-green-400':pct>=50?'text-yellow-400':'text-red-400';
                                                    return (
                                                        <div key={item.id} className={`border rounded-xl p-3 ${cc}`}>
                                                            <div className="flex items-start justify-between gap-3">
                                                                <div className="flex-1 min-w-0">
                                                                    <p className="text-sm font-bold text-white truncate">{item.examName}</p>
                                                                    <div className="flex items-center gap-3 mt-1">
                                                                        <span className={`text-lg font-black ${tc}`}>{item.score}/{item.maxScore}</span>
                                                                        <span className={`text-xs font-bold ${tc}`}>({item.percentage}%)</span>
                                                                    </div>
                                                                    <p className="text-[10px] text-gray-500 mt-1">{item.date}</p>
                                                                </div>
                                                                <button onClick={()=>handleDeleteHistory(item.id)} className="p-2 bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white rounded-lg transition flex-shrink-0">
                                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                                </button>
                                                            </div>
                                                        </div>
                                                    );
                                                }) : (
                                                    <div className="text-center py-12">
                                                        <i data-lucide="file-text" className="w-16 h-16 mx-auto text-gray-700 mb-4"></i>
                                                        <p className="text-sm text-gray-500">Chưa có lịch sử điểm</p>
                                                        <p className="text-xs text-gray-600 mt-1">Nhấn + để thêm điểm mới</p>
                                                    </div>
                                                )}
                                            </div>
                                            {examHistory.length > 0 && (
                                                <button onClick={handleClearHistory} className="w-full py-2 bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white font-bold rounded-xl transition flex items-center justify-center gap-2">
                                                    <i data-lucide="trash" className="w-4 h-4"></i>Xóa toàn bộ lịch sử
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ── FORGOT PASSWORD MODAL ── */}
                    {showForgot && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl">
                            <div className="w-full max-w-sm bg-[#0d0d0d] border border-cyan-500/30 rounded-[32px] p-8 relative">
                                <button onClick={()=>setShowForgot(false)} className="absolute top-6 right-6 text-gray-500 hover:text-white transition"><i data-lucide="x" className="w-5 h-5"></i></button>
                                <h2 className="text-xl font-black text-cyan-400 mb-8 flex items-center gap-3">
                                    <i data-lucide="key" className="w-6 h-6" />BẢO MẬT
                                    <i data-lucide="cloud" className="w-4 h-4 text-cyan-500/50"></i>
                                </h2>
                                {forgotStep===1 && (
                                    <div className="space-y-5">
                                        <input type="text" placeholder="TÊN ĐĂNG NHẬP" className="w-full bg-black border border-white/10 rounded-2xl py-4 px-4 outline-none focus:border-cyan-500 uppercase" value={forgotUser||currentUser?.user||""} onChange={e=>setForgotUser(e.target.value)} disabled={!!currentUser} />
                                        <button onClick={sendForgotOtp} disabled={isLoading} className="w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 text-white font-black rounded-2xl disabled:opacity-50">
                                            {isLoading?'ĐANG GỬI...':'GỬI MÃ OTP'}
                                        </button>
                                    </div>
                                )}
                                {forgotStep===2 && (
                                    <div className="space-y-5">
                                        <p className="text-xs text-gray-400 text-center">Kiểm tra email để lấy mã OTP</p>
                                        <input type="text" inputMode="numeric" placeholder="NHẬP MÃ OTP" className="w-full bg-black border border-white/10 rounded-2xl py-4 text-center font-black text-2xl tracking-widest outline-none focus:border-green-500" value={inputOtp} onChange={e=>setInputOtp(e.target.value)} maxLength={6} />
                                        <button onClick={verifyForgotOtp} className="w-full py-4 bg-gradient-to-r from-green-600 to-emerald-600 text-white font-black rounded-2xl">XÁC THỰC</button>
                                    </div>
                                )}
                                {forgotStep===3 && (
                                    <div className="space-y-5">
                                        <input type="password" placeholder="MẬT KHẨU MỚI (tối thiểu 6 ký tự)" className="w-full bg-black border border-white/10 rounded-2xl py-4 px-4 outline-none focus:border-cyan-500" value={forgotNewPw} onChange={e=>setForgotNewPw(e.target.value)} />
                                        <button onClick={updateForgotPassword} className="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-600 text-black font-black rounded-2xl flex items-center justify-center gap-2">
                                            <i data-lucide="cloud-upload" className="w-4 h-4" />CẬP NHẬT & SYNC CLOUD
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
